kind = "mobile"
previewPath = "/"
title = "Snow Connects"
version = "1.0.0"
id = "artifacts/snow-connects"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20034

[services.development]
run = "pnpm --filter @workspace/snow-connects run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/snow-connects", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/snow-connects", "run", "serve" ]

[services.env]
PORT = "20034"
BASE_PATH = "/"
